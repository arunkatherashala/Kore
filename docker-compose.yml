version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: kore-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - kore-network

  grafana:
    image: grafana/grafana:latest
    container_name: kore-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kore-network

networks:
  kore-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
