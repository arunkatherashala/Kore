name: Publish to RubyGems

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  rubygems:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Build gem
      run: |
        if [ -f kore-fileformat.gemspec ]; then
          gem build kore-fileformat.gemspec
        elif [ -f ruby/kore.gemspec ]; then
          cd ruby && gem build kore.gemspec
        else
          echo "No gemspec found (optional for this release)"
        fi
      continue-on-error: true
    
    - name: Publish to RubyGems
      run: |
        if ls *.gem 2>/dev/null; then
          gem push *.gem \
            --key ${{ secrets.RUBYGEMS_API_KEY }} \
            --host https://rubygems.org
        else
          echo "No gems found (optional for this release)"
        fi
      continue-on-error: true

    - name: Publish summary
      run: |
        echo "## RubyGems Publishing Status" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Status: Completed (optional - requires Ruby gem structure)" >> $GITHUB_STEP_SUMMARY


