name: Auto-Version & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  versioning:
    name: Auto-bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current
        run: |
          # Extract version from Cargo.toml as source of truth
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "//' | sed 's/".*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline | wc -l)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline | wc -l)
            COMMIT_MESSAGES=$(git log ${LAST_TAG}..HEAD --oneline)
          fi
          
          # Check for breaking changes (BREAKING:)
          if echo "$COMMIT_MESSAGES" | grep -q "BREAKING:"; then
            BUMP="major"
          # Check for features (feat:)
          elif echo "$COMMIT_MESSAGES" | grep -q "^feat"; then
            BUMP="minor"
          # Check for fixes (fix:)
          elif echo "$COMMIT_MESSAGES" | grep -q "^fix"; then
            BUMP="patch"
          else
            BUMP="none"
          fi
          
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.bump }}"
          
          if [ "$BUMP" = "none" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Parse semver
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        if: steps.version.outputs.changed == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" Cargo.toml

      - name: Update pyproject.toml
        if: steps.version.outputs.changed == 'true' && hashFiles('pyproject.toml') != ''
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$NEW_VERSION\"/" pyproject.toml || true

      - name: Update package.json
        if: steps.version.outputs.changed == 'true' && hashFiles('package.json') != ''
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          npm version $NEW_VERSION --no-git-tag-version || true

      - name: Update pom.xml
        if: steps.version.outputs.changed == 'true' && hashFiles('pom.xml') != ''
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false || true

      - name: Commit version bump
        if: steps.version.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create version tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  notify:
    name: Notify on version change
    runs-on: ubuntu-latest
    needs: versioning
    if: needs.versioning.outputs.changed == 'true'
    steps:
      - name: Version updated
        run: |
          echo "✅ Version bumped to ${{ needs.versioning.outputs.version }}"
          echo "🏷️  Tag: ${{ needs.versioning.outputs.tag }}"
          echo "🚀 All publishing workflows will trigger automatically"
