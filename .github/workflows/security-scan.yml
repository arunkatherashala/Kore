name: Security Scanning & Vulnerability Checks

on:
  push:
    branches:
      - main
      - develop
      - develop-v1.1.6
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  secret-scanning:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  rust-security:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --json | tee cargo-audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: rust-audit-report
          path: cargo-audit.json

  python-security:
    name: Python Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install audit tools
        run: |
          pip install pip-audit safety

      - name: Run pip-audit
        run: pip-audit || true

      - name: Check dependencies with safety
        run: safety check --json | tee safety-report.json || true

      - name: Upload safety report
        uses: actions/upload-artifact@v4
        with:
          name: python-safety-report
          path: safety-report.json

  nodejs-security:
    name: Node.js Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci 2>/dev/null || true

      - name: Run npm audit
        run: npm audit --json | tee npm-audit.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json

  java-security:
    name: Java Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Maven Dependency Check
        run: |
          cd java 2>/dev/null || true
          mvn org.owasp:dependency-check-maven:check -q 2>/dev/null || true

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['cpp', 'java', 'python', 'javascript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-summary:
    name: Security Check Summary
    runs-on: ubuntu-latest
    needs: [secret-scanning, rust-security, python-security, nodejs-security, java-security, codeql-analysis]
    if: always()
    steps:
      - name: Check security results
        run: |
          echo "## ðŸ”’ Security Scan Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Secret Scanning | ${{ needs.secret-scanning.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo "| Rust Audit | ${{ needs.rust-security.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo "| Python Safety | ${{ needs.python-security.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo "| Node.js Audit | ${{ needs.nodejs-security.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo "| Java Dependencies | ${{ needs.java-security.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo "| CodeQL Analysis | ${{ needs.codeql-analysis.result == 'success' && 'âœ… Passed' || 'âš ï¸ Review' }} |"
          echo ""
          echo "ðŸ“Š All scans completed. Review artifacts for detailed reports."

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ðŸ”’ Security Scans Complete\n\nAll security and vulnerability checks have been performed:\n- âœ… Secret detection\n- âœ… Dependency auditing (Rust, Python, Node.js, Java)\n- âœ… Code security analysis (CodeQL)\n\nReview artifacts in the Actions tab for detailed reports.`
            })


