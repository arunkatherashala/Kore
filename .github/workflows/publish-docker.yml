name: Publish to GitHub Container Registry
# Uses ghcr.io with built-in github.token (no secrets needed)
# More reliable than Docker Hub, no GitHub Actions secret bug issues

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
    
    - name: Build Rust binaries
      run: cargo build --release
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/kore:latest
          ghcr.io/${{ github.repository_owner }}/kore:main
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kore:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kore:buildcache,mode=max
