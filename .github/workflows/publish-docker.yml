name: Publish to Docker Hub
# Using pre-built Rust binaries + docker config.json for reliable authentication
# Workaround for GitHub Actions secret decryption issue

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
    
    - name: Build Rust binaries
      run: cargo build --release
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Create Docker config.json for authentication
      run: |
        mkdir -p ~/.docker
        cat > ~/.docker/config.json << EOF
        {
          "auths": {
            "https://index.docker.io/v1/": {
              "username": "${{ secrets.DOCKER_USER }}",
              "password": "${{ secrets.DOCKER_PASS }}",
              "auth": "$(echo -n '${{ secrets.DOCKER_USER }}:${{ secrets.DOCKER_PASS }}' | base64)"
            }
          }
        }
        EOF
        chmod 600 ~/.docker/config.json
        echo "✅ Docker config created"
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      run: |
        docker buildx build \
          --push \
          --tag ${{ secrets.DOCKER_USER }}/kore:latest \
          --tag ${{ secrets.DOCKER_USER }}/kore:${{ steps.version.outputs.version }} \
          --cache-from type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache \
          --cache-to type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache,mode=max \
          .
    
    - name: Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
        repository: ${{ secrets.DOCKER_USER }}/kore
        short-description: "KORE Binary Format - Complete 8-language ecosystem"
        readme-filepath: ./README.md
