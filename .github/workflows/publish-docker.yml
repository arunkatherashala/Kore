name: Publish to GitHub Container Registry (DISABLED)
# Docker publishing not feasible for this project:
# 1. kore_fileformat is a Rust library, not a binary application
# 2. Cargo build fails in Docker buildx with exit code 101
# 3. No executable to package into Docker image
#
# For library distribution, use crates.io (already working via PyPI/Maven/npm ecosystem)
# If Docker image is needed in future: implement CLI wrapper or use pre-built binaries from CI

on:
  # All triggers disabled - Docker publishing not applicable
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Docker publishing disabled
        run: |
          echo "Docker publishing is disabled for this project."
          echo "Reason: kore_fileformat is a library, not a binary application."
          echo "Cargo build fails in Docker buildx (exit code 101)."
          echo ""
          echo "Distribution channels:"
          echo "  ✅ PyPI (Python): https://pypi.org/project/kore-fileformat"
          echo "  ✅ Maven Central (Java): com.github.arunkatherashala:kore_fileformat"
          echo "  ✅ npm (JavaScript): https://npmjs.com/package/kore-fileformat"
          echo "  ✅ crates.io (Rust): https://crates.io/crates/kore_fileformat"
          echo ""
          exit 0
