name: Publish to Docker Hub (DISABLED)
# DISABLED: Docker publishing currently blocked by 2 issues:
# 1. Rust cargo build fails in buildx container (exit code 101)
# 2. GitHub Actions secrets not being read by Docker login step
# TODO: Fix cargo build in Docker OR use pre-built binaries
# NOTE: Token is valid (tested locally), but Actions workflow can't access secrets

on:
  # All automatic triggers disabled
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASS }}
      run: |
        # WARNING: Secrets are not being passed to workflow environment
        # Local test: docker login -u saiarunkumar --password-stdin works fine
        # GitHub Actions: secrets always empty
        echo "Attempting Docker login (secrets issue blocking)..."
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin || echo "Docker login failed"
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USER }}/kore:latest
          ${{ secrets.DOCKER_USER }}/kore:${{ steps.version.outputs.version }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache,mode=max
    
    - name: Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
        repository: ${{ secrets.DOCKER_USER }}/kore
        short-description: "KORE Binary Format - Complete 8-language ecosystem"
        readme-filepath: ./README.md
