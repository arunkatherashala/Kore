name: Publish to Docker Hub
# NEW APPROACH: Use pre-built Rust binaries (no cargo in Docker)
# Advantages:
# 1. Avoids cargo build in buildx (was failing with exit code 101)
# 2. Faster: only copy pre-built binaries instead of rebuilding in Docker
# 3. Simpler: standard Rust toolchain instead of buildx complexity

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
    
    - name: Build Rust binaries
      run: cargo build --release
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image (pre-built binaries)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USER }}/kore:latest
          ${{ secrets.DOCKER_USER }}/kore:${{ steps.version.outputs.version }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/kore:buildcache,mode=max
    
    - name: Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
        repository: ${{ secrets.DOCKER_USER }}/kore
        short-description: "KORE Binary Format - Complete 8-language ecosystem"
        readme-filepath: ./README.md
