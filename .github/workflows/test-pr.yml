name: PR Tests & Code Quality

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - develop-v1.1.6

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v3

      - name: Build Rust library
        run: cargo build --lib --release

      - name: Run Rust tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test '*'

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy (linter)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-python:
    name: Python Package Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e kore_fileformat/[dev]

      - name: Run Python tests
        run: python -m pytest kore_fileformat/tests -v

      - name: Check Python formatting
        run: |
          pip install black isort
          black --check kore_fileformat/
          isort --check-only kore_fileformat/

      - name: Lint with pylint
        run: |
          pip install pylint
          pylint kore_fileformat --disable=C0111,C0103 --exit-zero

  test-nodejs:
    name: Node.js Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: cd nodejs && npm ci

      - name: Run Jest tests
        run: cd nodejs && npm test

      - name: Check TypeScript
        run: cd nodejs && npx tsc --noEmit

  test-java:
    name: Java Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java library
        run: cd java && mvn clean compile -q

      - name: Run Java tests
        run: cd java && mvn test -q

      - name: Check Java formatting
        run: cd java && mvn spotless:check -q || true

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test-rust, test-python, test-nodejs, test-java]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Rust coverage
        run: cargo tarpaulin --out Xml --exclude-files tests/ 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          verbose: true

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-rust, test-python, test-nodejs, test-java, code-coverage]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-rust.result }}" != "success" ]; then
            echo "âŒ Rust tests failed"
            exit 1
          fi
          if [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "âŒ Python tests failed"
            exit 1
          fi
          if [ "${{ needs.test-nodejs.result }}" != "success" ]; then
            echo "âŒ Node.js tests failed"
            exit 1
          fi
          if [ "${{ needs.test-java.result }}" != "success" ]; then
            echo "âŒ Java tests failed"
            exit 1
          fi
          echo "âœ… All tests passed!"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results Summary')
            );
            
            const body = `## âœ… Test Results Summary
            
| Test Suite | Status |
|-----------|--------|
| Rust Tests | ${{ needs.test-rust.result == 'success' && 'âœ… Passed' || 'âŒ Failed' }} |
| Python Tests (3.9-3.11) | ${{ needs.test-python.result == 'success' && 'âœ… Passed' || 'âŒ Failed' }} |
| Node.js Tests (18.x, 20.x) | ${{ needs.test-nodejs.result == 'success' && 'âœ… Passed' || 'âŒ Failed' }} |
| Java Tests (JDK 17) | ${{ needs.test-java.result == 'success' && 'âœ… Passed' || 'âŒ Failed' }} |
| Code Coverage | âœ… Generated |

### Summary
All language bindings tested successfully across multiple runtime versions.`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }


