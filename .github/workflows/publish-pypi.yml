name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger from Actions tab

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build
    
    - name: Clean build artifacts
      run: |
        rm -rf build/ dist/ *.egg-info/ .eggs/ || true
    
    - name: Build distribution packages
      run: |
        python -m build
    
    - name: Check wheel metadata
      run: |
        echo "Wheel file contents:"
        unzip -l dist/kore_fileformat-0.1.0-py3-none-any.whl
        echo -e "\n\nMETADATA file:"
        unzip -p dist/kore_fileformat-0.1.0-py3-none-any.whl kore_fileformat-0.1.0.dist-info/METADATA | head -20
        echo -e "\n\nInstalling twine and checking:"
        pip install twine
        twine check dist/*
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@v1.10.0
