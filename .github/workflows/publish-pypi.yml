name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Extract version
      id: version
      run: |
        # For tag-triggered workflows, use the tag
        # For manual workflow_dispatch, extract from Cargo.toml
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/}"
        else
          # Extract version from Cargo.toml
          VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version detected: ${VERSION}"
      shell: bash
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade maturin setuptools wheel
    
    - name: Build wheel with maturin (Linux)
      if: runner.os == 'Linux'
      run: |
        maturin build --release --out wheels
    
    - name: Build wheel with maturin (Windows)
      if: runner.os == 'Windows'
      run: |
        maturin build --release --out wheels
    
    - name: Build wheel with maturin (macOS)
      if: runner.os == 'macOS'
      run: |
        maturin build --release --out wheels
    
    
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheels/
        retention-days: 1
  
  publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract version
      id: version
      run: |
        # For tag-triggered workflows, use the tag
        # For manual workflow_dispatch, extract from Cargo.toml
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/}"
        else
          # Extract version from Cargo.toml
          VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version detected: ${VERSION}"
      shell: bash
    
    - name: Download all wheel artifacts (merge)
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        path: all-wheels
    
    - name: Organize wheels for publish
      run: |
        mkdir -p dist
        VERSION="${{ steps.version.outputs.version }}"
        VERSION_NO_V="${VERSION#v}"
        echo "Looking for wheels matching version: ${VERSION_NO_V}"
        # Find and copy ONLY wheels matching current version (avoid old artifacts)
        find all-wheels -maxdepth 2 -name "*${VERSION_NO_V}*.whl" -exec cp {} dist/ \;
        echo "Wheels ready for publish:"
        ls -lh dist/
        echo "Wheel count: $(find dist -name '*.whl' | wc -l)"
        if [ $(find dist -name '*.whl' | wc -l) -ne 3 ]; then
          echo "ERROR: Expected 3 wheels, found $(find dist -name '*.whl' | wc -l)"
          find all-wheels -name "*.whl" | sort
          exit 1
        fi
    
    - name: Validate wheels with twine
      run: |
        pip install --upgrade twine
        twine check dist/*.whl --strict
    
    - name: Publish to PyPI (OIDC/Trusted Publisher)
      uses: pypa/gh-action-pypi-publish@v1.10.0
      with:
        packages-dir: dist/
        skip-existing: true
    
    - name: Publish summary
      run: |
        echo "## PyPI Publishing Status" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Platforms: Linux, Windows, macOS" >> $GITHUB_STEP_SUMMARY
        echo "Wheels published:" >> $GITHUB_STEP_SUMMARY
        ls -1 dist/*.whl | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY





