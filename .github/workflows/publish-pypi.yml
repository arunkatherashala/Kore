name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade build twine wheel
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: python -m twine check dist/*
    
    - name: Generate OIDC Token
      id: generate-token
      run: |
        import urllib.request
        import json
        import os
        from urllib.error import URLError
        
        oidc_url = os.getenv('ACTIONS_ID_TOKEN_REQUEST_URL')
        oidc_token_request_token = os.getenv('ACTIONS_ID_TOKEN_REQUEST_TOKEN')
        
        req = urllib.request.Request(oidc_url + '&audience=https://pypi.org')
        req.add_header('Authorization', f'bearer {oidc_token_request_token}')
        
        try:
          with urllib.request.urlopen(req) as response:
            body = json.loads(response.read())
            token = body['token']
            with open(os.getenv('GITHUB_OUTPUT'), 'a') as f:
              f.write(f'token={token}\n')
        except URLError as e:
          print(f'Error: {e}')
          exit(1)
      shell: python
    
    - name: Upload to PyPI
      run: |
        python -m twine upload \
          --non-interactive \
          -u __token__ \
          -p "${{ steps.generate-token.outputs.token }}" \
          dist/*


