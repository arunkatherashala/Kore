name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade maturin setuptools wheel
    
    - name: Build wheel with maturin
      run: |
        maturin build --release --interpreter python3.12 --out wheels
    
    - name: Fix wheel metadata
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        python3 << 'PYEOF'
        import zipfile, os, tempfile, shutil, sys
        
        whl_files = [f for f in os.listdir('wheels') if f.endswith('.whl')]
        if not whl_files:
            print("ERROR: No wheel file found")
            sys.exit(1)
        
        whl_path = os.path.join('wheels', whl_files[0])
        
        # Read README for the body
        with open('README.md', 'r', encoding='utf-8') as f:
            readme_content = f.read()
        
        # Get version from environment (with v prefix stripped)
        version = os.environ.get('VERSION', '').lstrip('v')
        
        temp_dir = tempfile.mkdtemp()
        try:
            with zipfile.ZipFile(whl_path, 'r') as z:
                z.extractall(temp_dir)
            
            for root, dirs, files in os.walk(temp_dir):
                for file in files:
                    if file == 'METADATA':
                        metadata_path = os.path.join(root, file)
                        
                        lines = [
                            "Metadata-Version: 2.1",
                            "Name: kore-fileformat",
                            f"Version: {version}",
                            "Summary: KORE Binary Format - High-performance columnar compression with 5-8x compression ratio",
                            "Home-page: https://github.com/arunkatherashala/Kore",
                            "Author: Sai Arun Kumar Ktherashala",
                            "Author-email: arunkatherashala@gmail.com",
                            "License: Apache 2.0",
                            "Project-URL: Repository, https://github.com/arunkatherashala/Kore",
                            "Project-URL: Issues, https://github.com/arunkatherashala/Kore/issues",
                            "Description-Content-Type: text/markdown",
                            "Keywords: compression,binary-format,performance,serialization",
                            "Requires-Python: >=3.8",
                            "Classifier: Development Status :: 5 - Production/Stable",
                            "Classifier: Intended Audience :: Developers",
                            "Classifier: License :: OSI Approved :: Apache Software License",
                            "Classifier: Programming Language :: Python :: 3",
                            "Classifier: Programming Language :: Python :: 3.8",
                            "Classifier: Programming Language :: Python :: 3.9",
                            "Classifier: Programming Language :: Python :: 3.10",
                            "Classifier: Programming Language :: Python :: 3.11",
                            "Classifier: Programming Language :: Python :: 3.12",
                        ]
                        # Join headers and append README as body with blank line separator
                        proper_metadata = "\n".join(lines) + "\n\n" + readme_content
                        
                        with open(metadata_path, 'w', encoding='utf-8') as f:
                            f.write(proper_metadata)
            
            os.remove(whl_path)
            with zipfile.ZipFile(whl_path, 'w', zipfile.ZIP_DEFLATED) as z:
                for root, dirs, files in os.walk(temp_dir):
                    for file in files:
                        file_path = os.path.join(root, file)
                        arcname = os.path.relpath(file_path, temp_dir)
                        z.write(file_path, arcname)
        finally:
            shutil.rmtree(temp_dir)
        PYEOF
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheels/

  publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-wheels
    
    - name: Flatten wheels directory
      run: |
        mkdir -p wheels
        find all-wheels -name "*.whl" -exec mv {} wheels/ \;
        ls wheels/
    
    - name: Publish to PyPI (OIDC/Trusted Publisher)
      uses: pypa/gh-action-pypi-publish@v1.10.0
      with:
        packages-dir: wheels/
        skip-existing: false

    - name: Publish summary
      run: |
        echo "## PyPI Publishing Status" >> $GITHUB_STEP_SUMMARY
        echo "Platforms: Linux (x86_64), Windows (amd64), macOS (arm64/x86_64)" >> $GITHUB_STEP_SUMMARY
        echo "Status: ✅ Completed" >> $GITHUB_STEP_SUMMARY
        echo "Wheels: $(ls wheels/ | wc -l) files" >> $GITHUB_STEP_SUMMARY





