name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade maturin setuptools wheel
    
    - name: Build wheel with maturin (Linux)
      if: runner.os == 'Linux'
      run: |
        maturin build --release --out wheels
    
    - name: Build wheel with maturin (Windows)
      if: runner.os == 'Windows'
      run: |
        maturin build --release --out wheels
    
    - name: Build wheel with maturin (macOS)
      if: runner.os == 'macOS'
      run: |
        maturin build --release --out wheels
    
    
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheels/
        retention-days: 1
  
  publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash
    
    - name: Download all wheel artifacts (merge)
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
        path: all-wheels
    
    - name: Organize wheels for publish
      run: |
        mkdir -p dist
        # Find all .whl files and copy directly (avoid corruption from consolidation)
        find all-wheels -maxdepth 2 -name "*.whl" -exec cp {} dist/ \;
        echo "Wheels ready for publish:"
        ls -lh dist/
    
    - name: Validate wheels with twine
      run: |
        pip install twine
        twine check dist/*.whl --strict
    
    - name: Publish to PyPI (OIDC/Trusted Publisher)
      uses: pypa/gh-action-pypi-publish@v1.10.0
      with:
        packages-dir: dist/
        skip-existing: true
    
    - name: Publish summary
      run: |
        echo "## PyPI Publishing Status - v1.1.4 Multi-Platform" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Platforms: Linux, Windows, macOS (universal2)" >> $GITHUB_STEP_SUMMARY
        echo "Wheels published:" >> $GITHUB_STEP_SUMMARY
        ls -1 final-wheels/*.whl | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY





