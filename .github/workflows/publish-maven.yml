name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  maven:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD

    - name: Generate and Import GPG Key
      run: |
        mkdir -p ~/.gnupg
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        gpg-agent --daemon
        
        # Generate a GPG key for signing
        cat > /tmp/gpg_key_batch.txt <<'EOF'
        %echo Generating GPG key for Maven Central
        Key-Type: RSA
        Key-Length: 2048
        Name-Real: KORE Build System
        Name-Email: build@kore.example.com
        Expire-Date: 0
        %no-protection
        %commit
        %echo done
        EOF
        
        gpg --batch --generate-key /tmp/gpg_key_batch.txt
        GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep "sec.*rsa2048" | head -1 | awk '{print $1}' | cut -d'/' -f2)
        echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
        
        # Export and try to upload public key
        gpg --export --armor $GPG_KEY_ID > /tmp/public_key.asc
        echo "GPG Key ID: $GPG_KEY_ID"

    - name: Build with Maven
      run: |
        cd language-bindings/java
        mvn clean package

    - name: Publish to Maven Central
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      run: |
        cd language-bindings/java
        mvn clean deploy
