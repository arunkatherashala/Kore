name: KORE Release & Deploy

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build Release Artifacts
  build-release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kore
            asset_name: kore-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kore
            asset_name: kore-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kore.exe
            asset_name: kore-windows-x86_64.exe
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  # Create Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-release
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download Artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release Notes
        run: |
          TAG=${{ github.ref_name }}
          echo "# KORE Release $TAG" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Build Information" >> RELEASE_NOTES.md
          echo "- Build Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Components" >> RELEASE_NOTES.md
          echo "- KORE Core Library" >> RELEASE_NOTES.md
          echo "- Apache Spark Integration" >> RELEASE_NOTES.md
          echo "- AWS Glue Connector" >> RELEASE_NOTES.md
          echo "- Snowflake Direct Loader" >> RELEASE_NOTES.md
          echo "- Gorilla Time-Series Compression" >> RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            kore-linux-x86_64/kore
            kore-macos-x86_64/kore
            kore-windows-x86_64.exe/kore.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to Crates.io
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      - name: Publish Main Crate
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }} 2>/dev/null || echo "Crate already published"
      
      - name: Publish Spark
        run: cd language-bindings/spark && cargo publish --token ${{ secrets.CARGO_TOKEN }} 2>/dev/null || echo "Spark crate already published"
      
      - name: Publish AWS Glue
        run: cd language-bindings/aws-glue && cargo publish --token ${{ secrets.CARGO_TOKEN }} 2>/dev/null || echo "AWS Glue crate already published"
      
      - name: Publish Snowflake
        run: cd language-bindings/snowflake && cargo publish --token ${{ secrets.CARGO_TOKEN }} 2>/dev/null || echo "Snowflake crate already published"

  # Notification
  notify:
    name: Release Notification
    runs-on: ubuntu-latest
    needs: [build-release, create-release, publish-crates]
    if: always()
    
    steps:
      - name: Send Notification
        run: |
          echo "📢 KORE Release ${{ github.ref_name }} Complete!"
          echo ""
          echo "Build Status: ${{ needs.build-release.result }}"
          echo "Release Created: ${{ needs.create-release.result }}"
          echo "Published to Crates.io: ${{ needs.publish-crates.result }}"
