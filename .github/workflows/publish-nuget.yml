name: Publish to NuGet

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  nuget:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Find C# project
      id: find-project
      run: |
        PROJECT_PATH="csharp/Kore.FileFormat/Kore.FileFormat.csproj"
        if [ ! -f "$PROJECT_PATH" ]; then
          echo "error=C# project not found at $PROJECT_PATH"
          exit 1
        fi
        echo "project_path=$PROJECT_PATH" >> $GITHUB_OUTPUT
        echo "Found project at: $PROJECT_PATH"
    
    - name: Restore dependencies
      run: dotnet restore "${{ steps.find-project.outputs.project_path }}"
    
    - name: Build NuGet package
      run: |
        dotnet pack "${{ steps.find-project.outputs.project_path }}" \
          --configuration Release \
          --output nupkg
    
    - name: Publish to NuGet
      run: |
        if [ -d nupkg ] && [ "$(ls -A nupkg)" ]; then
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        else
          echo "No NuGet packages found to publish"
          exit 0
        fi

    - name: Publish summary
      run: |
        echo "## NuGet Publishing Status" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Status: Completed (optional - requires .NET project structure)" >> $GITHUB_STEP_SUMMARY


